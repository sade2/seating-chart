name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'vite.config.ts'
      - 'package*.json'
      - 'infrastructure/lambda/src/**'

permissions:
  id-token: write   # Required for OIDC
  contents: read

env:
  AWS_REGION: us-east-1
  NODE_VERSION: '20'

jobs:
  # ── Deploy Frontend ────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Validate required variables
        run: |
          missing=()
          test -n "${{ secrets.DEPLOY_ROLE_ARN }}"        || missing+=(DEPLOY_ROLE_ARN)
          test -n "${{ secrets.API_URL }}"                || missing+=(API_URL)
          test -n "${{ secrets.COGNITO_USER_POOL_ID }}"   || missing+=(COGNITO_USER_POOL_ID)
          test -n "${{ secrets.COGNITO_CLIENT_ID }}"      || missing+=(COGNITO_CLIENT_ID)
          test -n "${{ secrets.COGNITO_DOMAIN }}"         || missing+=(COGNITO_DOMAIN)
          test -n "${{ secrets.REDIRECT_URI }}"           || missing+=(REDIRECT_URI)
          test -n "${{ secrets.FRONTEND_BUCKET }}"        || missing+=(FRONTEND_BUCKET)
          test -n "${{ secrets.CF_DISTRIBUTION_ID }}"     || missing+=(CF_DISTRIBUTION_ID)
          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing required variables for environment 'dev': ${missing[*]}"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.API_URL }}
          VITE_COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID }}
          VITE_COGNITO_DOMAIN: ${{ secrets.COGNITO_DOMAIN }}
          VITE_REDIRECT_URI: ${{ secrets.REDIRECT_URI }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync assets (immutable cache)
        run: |
          aws s3 sync dist/assets/ s3://${{ secrets.FRONTEND_BUCKET }}/assets/ \
            --cache-control "public,max-age=31536000,immutable" \
            --delete

      - name: Sync root (no-cache for index.html + manifests)
        run: |
          aws s3 sync dist/ s3://${{ secrets.FRONTEND_BUCKET }}/ \
            --cache-control "no-cache,no-store,must-revalidate" \
            --exclude "assets/*" \
            --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_DISTRIBUTION_ID }} \
            --paths "/*"

  # ── Deploy Lambda ──────────────────────────────────────────────────────────
  deploy-lambda:
    name: Deploy Lambda
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Validate required variables
        run: |
          missing=()
          test -n "${{ secrets.DEPLOY_ROLE_ARN }}"        || missing+=(DEPLOY_ROLE_ARN)
          test -n "${{ secrets.LAMBDA_FUNCTION_NAME }}"   || missing+=(LAMBDA_FUNCTION_NAME)
          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing required variables for environment 'dev': ${missing[*]}"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: infrastructure/lambda/package-lock.json

      - name: Install Lambda dependencies
        working-directory: infrastructure/lambda
        run: npm ci

      - name: Build Lambda
        working-directory: infrastructure/lambda
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://infrastructure/lambda/dist/handler.zip
