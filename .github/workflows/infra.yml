name: Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'infrastructure/**'
  pull_request:
    branches: [main]
    paths:
      - 'infrastructure/**'

permissions:
  id-token: write   # Required for OIDC
  contents: read

env:
  TF_VERSION: "1.7.5"
  AWS_REGION: us-east-1

jobs:
  # ── Build Lambda (required before terraform plan) ──────────────────────────
  build-lambda:
    name: Build Lambda
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infrastructure/lambda/package-lock.json

      - name: Install Lambda dependencies
        working-directory: infrastructure/lambda
        run: npm ci

      - name: Build Lambda bundle
        working-directory: infrastructure/lambda
        run: npm run build

      - name: Upload Lambda artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-dist
          path: infrastructure/lambda/dist/handler.zip
          retention-days: 1

  # ── Terraform ──────────────────────────────────────────────────────────────
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    needs: build-lambda
    environment: dev
    defaults:
      run:
        working-directory: infrastructure/environments/dev

    steps:
      - uses: actions/checkout@v4

      - name: Download Lambda artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-dist
          path: infrastructure/lambda/dist

      - name: Validate required variables
        run: |
          missing=()
          test -n "${{ vars.INFRA_ROLE_ARN }}" || missing+=(INFRA_ROLE_ARN)
          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing required variables for environment 'dev': ${missing[*]}"
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.INFRA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

      - name: Terraform Apply (main branch only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.plan.outcome == 'success'
        run: terraform apply -auto-approve tfplan
